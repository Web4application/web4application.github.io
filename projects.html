<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web4application | Project Hub</title>
    <style>
        /* 1. CORE LAYOUT (The Shell) */
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 2rem;
        }

        /* 2. THE GRID (Unique Layouts) */
        #project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 3. UNIQUE COMPONENT STYLES */
        .project-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #334155;
            transition: transform 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Automatic "Unique Layout" via CSS Classes */
        .project-card.glassmorphism {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .project-card.terminal-dark {
            background: #000;
            border-left: 4px solid #10b981;
            font-family: 'Courier New', monospace;
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background: var(--accent);
            color: #000;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            text-align: center;
        }

        .tags { font-size: 0.8rem; color: #94a3b8; margin: 10px 0; }
        .tags span { margin-right: 8px; font-style: italic; }
    </style>
</head>
<body>

    <header style="text-align: center; margin-bottom: 4rem;">
        <h1>Web4application</h1>
        <p>Automated Delivery Hub for My High-Tech Projects</p>
    </header>

    <!-- The Stage where projects appear -->
    <div id="project-grid">
        <p>Loading projects from GitHub...</p>
    </div>

    <script>
        const GITHUB_USERNAME = 'Web4application';

        async function buildProjectHub() {
            try {
                const response = await fetch(`https://api.github.com{GITHUB_USERNAME}/repos?sort=updated`);
                const repos = await response.json();
                const container = document.getElementById('project-grid');
                container.innerHTML = ''; // Clear loading text

                repos.forEach(repo => {
                    // Skip the landing site repo itself
                    if (repo.name.toLowerCase() !== `${GITHUB_USERNAME}.github.io`.toLowerCase()) {
                        
                        const card = document.createElement('div');
                        
                        // Apply Unique Layout based on GitHub Topics
                        // (e.g., if you tag a repo 'glassmorphism' on GitHub)
                        const layoutClass = repo.topics.includes('glassmorphism') ? 'glassmorphism' : 
                                            repo.topics.includes('terminal') ? 'terminal-dark' : '';
                        
                        card.className = `project-card ${layoutClass}`;

                        card.innerHTML = `
                            <div>
                                <h3>${repo.name}</h3>
                                <p>${repo.description || 'No description provided.'}</p>
                                <div class="tags">
                                    ${repo.topics.map(t => `<span>#${t}</span>`).join('')}
                                </div>
                            </div>
                            <div class="actions">
                                <a href="${repo.html_url}" target="_blank" style="color: #94a3b8;">Code</a>
                                ${repo.homepage ? `<a href="${repo.homepage}" class="btn">Launch App</a>` : ''}
                            </div>
                        `;
                        container.appendChild(card);
                    }
                });
            } catch (error) {
                console.error("Error fetching projects:", error);
            }
        }

        buildProjectHub();
    </script>
</body>
</html>
